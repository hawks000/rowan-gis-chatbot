<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rowan County GIS Assistant</title>
    <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}?v=18">
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div>
                <p class="eyebrow">Rowan County, NC</p>
                <h1>GIS Assistant</h1>
                <p class="subtitle">Ask about parcels, addresses, owners, streets, and subdivisions — or click a parcel on the map.</p>
            </div>
            <a class="admin-link" href="{{ url_for('admin_queries') }}">Staff log</a>
        </header>

        <main class="layout">
            <section class="chat-panel">
                <div id="chat-messages" class="chat-messages" aria-live="polite"></div>

                <div id="recent-searches" class="recent-searches hidden">
                    <p class="suggestions-label">Recent:</p>
                    <div id="recent-buttons" class="suggestion-buttons"></div>
                </div>

                <div class="suggestions">
                    <p class="suggestions-label">Try asking:</p>
                    <div id="suggestion-buttons" class="suggestion-buttons"></div>
                </div>

                <form id="chat-form" class="chat-form">
                    <input
                        id="chat-input"
                        type="text"
                        placeholder="e.g. PIN 1234567890 or 123 Main St Salisbury"
                        autocomplete="off"
                        list="search-suggestions"
                        required
                    >
                    <datalist id="search-suggestions"></datalist>
                    <button type="submit" id="chat-submit">Ask</button>
                </form>

                <p class="privacy-note">
                    Questions are logged anonymously to help improve this service. Result details are not stored.
                    <span class="keyboard-hint">Press <kbd>/</kbd> to focus search.</span>
                </p>
            </section>

            <section class="map-panel">
                <div class="map-controls">
                    <label class="map-toggle">
                        <input type="checkbox" id="toggle-pictometry" checked>
                        Aerial imagery
                    </label>
                </div>
                <div id="map-status" class="map-status">Loading map...</div>
                <div id="map-view"></div>
                <div id="result-list" class="result-list hidden"></div>
            </section>
        </main>
    </div>

    <script>
        window.GIS_CHATBOT_CONFIG = {
            basemapUrl: {{ basemap_url | default('https://gis.rowancountync.gov/arcgis/rest/services/Public/MapViewer/MapServer', true) | tojson }},
            pictometryUrl: {{ pictometry_url | default('https://gis.rowancountync.gov/arcgis/rest/services/Pictometry/Pictometry2025/MapServer', true) | tojson }},
            webmapItemId: {{ webmap_item_id | tojson }},
            portalUrl: {{ portal_url | tojson }},
            queryUrl: {{ url_for('api_query') | tojson }},
            parcelAtPointUrl: {{ url_for('api_parcel_at_point') | tojson }},
            layersUrl: {{ url_for('api_layers') | tojson }},
            autocompleteUrl: {{ url_for('api_autocomplete') | tojson }},
            subdivisionsUrl: {{ url_for('api_subdivisions') | tojson }}
        };
    </script>
    <script src="https://js.arcgis.com/4.29/"></script>
    <script src="{{ url_for('static', filename='js/map.js') }}?v=47"></script>
    <script src="{{ url_for('static', filename='js/chat.js') }}?v=30"></script>
</body>
</html>
